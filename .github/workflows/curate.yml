name: IssueHawk Curation Run

on:
  schedule:
    # Run at 08:00 UTC every Monday (adjust schedule as needed)
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Curation Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python main.py --run-now

      - name: Commit & Push Memory and Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/memory.db reports/
          git diff-index --quiet HEAD || git commit -m "chore: archive reports and update memory state [skip ci]"
          git push
